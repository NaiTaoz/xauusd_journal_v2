<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;height:100vh;}
  #coin{width:128px;height:128px;image-rendering:pixelated;}
</style>
</head>
<body>
<img id="coin">
<script>
const frames=["coin_1.png","coin_2.png","coin_3.png","coin_4.png","coin_5.png","coin_6.png"];
let i=0,img=document.getElementById('coin');
frames.forEach(s=>{new Image().src=s});
img.src=frames[0];
setInterval(()=>{i=(i+1)%frames.length;img.src=frames[i];},140);
</script>
</body>
</html>
